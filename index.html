<div id="intro-overlay">
    <div class="intro-content">
        <div style="font-size: 2rem; color: #A86B4C; margin-bottom: 10px;">▲</div>
        <h1>The Compass</h1>
        <p>EST. 2026 | EXPLORE THE WILD</p>
        <button class="ready-btn" onclick="enterSite()">READY TO GET GOING</button>
    </div>
</div>

<script>
    // Prevent scrolling while the intro is active
    document.body.style.overflow = 'hidden';

    function enterSite() {
        const overlay = document.getElementById('intro-overlay');
        
        // 1. Start the fade out
        overlay.style.opacity = '0';
        overlay.style.pointerEvents = 'none'; // Makes it click-through-able immediately
        
        // 2. Re-enable scrolling
        document.body.style.overflow = 'auto';
        
        // 3. Remove from DOM after transition finishes so it's totally gone
        setTimeout(() => {
            overlay.style.display = 'none';
        }, 1500); 
    }
</script>
