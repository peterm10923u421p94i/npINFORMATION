<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>National Park Explorer</title>
    <link href="https://fonts.googleapis.com/css2?family=Arvo:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* --- RUSTIC CSS (park.css) --- */
        :root {
            --forest: #2D4033;
            --wood: #5C3A2E;
            --parchment: #F4EFE6;
            --dirt: #8B5E3C;
            --trail-sign: #E9D758;
        }

        body {
            background-color: var(--parchment);
            color: var(--wood);
            font-family: 'Lora', serif;
            margin: 0;
            line-height: 1.8;
        }

        /* NAVIGATION */
        .nav-bar {
            background-color: var(--forest);
            display: flex;
            justify-content: center;
            padding: 1.2rem;
            border-bottom: 6px solid var(--wood);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-bar button {
            background: none;
            border: none;
            color: white;
            margin: 0 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'Arvo', serif;
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        .nav-bar button:hover { color: var(--trail-sign); }

        /* CONTENT VISIBILITY LOGIC */
        .page-section { display: none; } /* Hidden by default */
        .active { display: block; }      /* Shown when active */

        .container { max-width: 900px; margin: 40px auto; padding: 20px; }

        h1, h2 { font-family: 'Arvo', serif; text-transform: uppercase; color: var(--forest); }

        .park-img {
            width: 100%;
            height: 450px;
            object-fit: cover;
            border: 12px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin: 20px 0;
        }

        .stats-card {
            background: white;
            border: 2px solid var(--wood);
            padding: 25px;
            margin-bottom: 20px;
        }

        .official-link {
            display: inline-block;
            margin-top: 10px;
            color: var(--dirt);
            font-weight: bold;
            text-decoration: underline;
        }

            padding: 50px;
            background: white;
            border: 3px dashed var(--wood
